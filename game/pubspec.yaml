name: mg_game_0011
description: Fairy Forest Healing Idle Game
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  google_mobile_ads: ^5.2.0
  flutter:
    sdk: flutter
  provider: ^6.1.1
  get_it: ^9.2.0
  equatable: ^2.0.5
  mg_common_game:
    path: ../../../libs/mg_common_game
  flame: ^1.14.0
  flame_spine: ^0.3.0+1
  shared_preferences: ^2.2.2

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  firebase_core: ^2.32.0
  cloud_firestore: ^4.17.5
  firebase_auth: ^4.16.0
  firebase_remote_config: ^4.4.7
  firebase_analytics: ^10.10.7
  firebase_messaging: ^14.7.10
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/spine/characters/
